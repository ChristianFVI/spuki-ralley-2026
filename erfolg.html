<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Richtig gelöst</title>

<style>

body{
    margin:0;
    font-family:"Trebuchet MS", sans-serif;
    background:#d8c79a;
}

.map{
    max-width:700px;
    margin:60px auto;
    padding:40px;
    background:#f4e6b5;
    border:8px solid #8b6f3d;
    border-radius:10px;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    text-align:center;
}

.spuki{
    font-size:80px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    50%{transform:translateY(-12px)}
    100%{transform:translateY(0)}
}

h1{
    color:#3b2f1d;
}

p{
    font-size:20px;
    margin-top:20px;
}

.x{
    font-size:60px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="map">

<div class="spuki">👻</div>

<h1>Richtig gelöst!</h1>

<p>
Gut gemacht. 42 Kilometer bis Nr. Nebel. Vati sagt ja immer Nister Nebel.
Jetzt geht es am Haus weiter. Sucht das Loch außen am Bad.
</p>

<div class="x">❌</div>

<p>Spuki sagt: Weiter zur nächsten Station!</p>

</div>

</body>
</html>
