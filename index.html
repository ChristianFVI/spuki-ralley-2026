<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spukis Dänemark Rallye</title>

<style>

body{
    margin:0;
    font-family: "Trebuchet MS", sans-serif;
    background:#d8c79a;
    background-image: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 8px 8px;
}

.map{
    max-width:700px;
    margin:60px auto;
    padding:40px;
    background:#f4e6b5;
    border:8px solid #8b6f3d;
    border-radius:10px;
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    text-align:center;
}

h1{
    font-size:28px;
    color:#3b2f1d;
}

.spuki{
    font-size:70px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0)}
    50%{transform:translateY(-10px)}
    100%{transform:translateY(0)}
}

p{
    font-size:18px;
    margin-top:10px;
}

input{
    padding:12px;
    font-size:18px;
    margin-top:20px;
    width:180px;
    text-align:center;
    border-radius:8px;
    border:2px solid #8b6f3d;
}

button{
    padding:12px 22px;
    font-size:18px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#3a7bd5;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2459a6;
}

#message{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.decor{
    font-size:30px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="map">

<div class="spuki">👻</div>

<h1>Spukis Nordsee Schatzkarte</h1>

<p>
Gebe hier deine Lösung zum Sondervig Rätsel ein, dann weißt du wie es weiter geht
</p>

<input id="answer" placeholder="Deine Lösung">

<br>

<button onclick="check()">Lösung prüfen</button>

<div id="message"></div>

<div class="decor">
🌊 🐚 🧭 🏖️
</div>

</div>

<script>

function check(){

let input=document.getElementById("answer").value.trim();
let message=document.getElementById("message");

if(input==="42"){

message.style.color="green";
message.innerHTML="👻 Spuki freut sich... richtige Lösung!";

setTimeout(function(){
window.location.href="erfolg.html";
},1500);

}else{

message.style.color="red";
message.innerHTML="Schade, das ist nicht korrekt";

}

}

</script>

</body>
</html>
